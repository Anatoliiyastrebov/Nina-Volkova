<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7d6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a8c5a8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон документа -->
  <rect x="20" y="15" width="60" height="70" rx="5" fill="url(#fileGrad)" opacity="0.9"/>
  
  <!-- Медицинский крест на документе -->
  <!-- Вертикальная линия -->
  <rect x="45" y="35" width="10" height="30" rx="5" fill="white" opacity="0.95"/>
  <!-- Горизонтальная линия -->
  <rect x="35" y="45" width="30" height="10" rx="5" fill="white" opacity="0.95"/>
  
  <!-- Стрелка вверх (загрузка) -->
  <path d="M 50 70 L 45 75 L 50 80 L 55 75 Z" fill="white" opacity="0.8"/>
  <line x1="50" y1="70" x2="50" y2="85" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
</svg>

